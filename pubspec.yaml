name: eclipse_shell
description: EclipseShell - High fidelity local music player with MoonShell-inspired UI.
publish_to: 'none'
version: 0.1.0+1
environment:
  sdk: '>=3.1.0 <4.0.0'
  flutter: '>=3.7.0'
dependencies:
  flutter:
    sdk: flutter
  
  # Combinación exacta y equilibrada sugerida por el compilador
  just_audio: 0.9.40
  audio_session: 0.1.25
  audio_service: 0.18.18
  provider: ^6.1.2
  
  # Para solicitar permisos de lectura de archivos locales
  file_selector: ^0.9.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.0.14
  # metadata extraction removed for CI stability; falling back to ID3v1 parser
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1

flutter:
  uses-material-design: true
