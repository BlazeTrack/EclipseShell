name: eclipse_shell
description: EclipseShell - High fidelity local music player with MoonShell-inspired UI.
publish_to: 'none'
version: 0.1.0+1
environment:
  sdk: '>=3.1.0 <4.0.0'
  flutter: '>=3.7.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  just_audio: ^0.9.40
  audio_session: ^0.1.8
  audio_service: ^0.19.0
  ffmpeg_kit_flutter_audio: ^4.5.1
  path_provider: ^2.0.15
  provider: ^6.0.5
  flutter_svg: ^2.0.9
  file_picker: ^5.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.1

flutter:
  uses-material-design: true
